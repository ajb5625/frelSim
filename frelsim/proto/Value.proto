syntax = "proto3";

package frelsim.type.proto;

import "frelsim/proto/Type.proto";

// A Value is raw data plus the Type that describes how to interpret it.
// `data` is a packed byte encoding (fixed-width scalars little-endian; a
// struct is its fields packed at the offsets TypeRegistry computes for its
// StructType; an array is its elements packed back-to-back) - not a
// self-describing tree of sub-values. A struct/array Value's `type` is
// commonly a `type_ref` into a TypeRegistry rather than an inline
// description, so many Values can share one schema.
message Value {
    Type type = 1;
    bytes data = 2;
}

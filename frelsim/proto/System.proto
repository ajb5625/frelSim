syntax = "proto3";

package frelsim.sim.proto;

import "frelsim/proto/Simulation.proto";
import "frelsim/proto/Identifier.proto";


/*
    Use the identifier to identify our simulation.
    
    Simulation Description tells us what it is so we can load and simulate it.

    Source is the previous simulation in the system; where does our simulations inputs come from?

    Destination is the next simulation in the system; where does our simulations outputs go?
*/
message RoutedSimulation {
    Identifier simulation = 1;
    SimulationDescription sim_description = 2;
    Identifier source = 3;
    repeated Identifier destinations = 4;

    // Applied once, right after this simulation is constructed and before
    // the run loop starts - e.g. PID gains/setpoint, or a plant's mass. Per
    // RoutedSimulation rather than SimulationDescription since the same
    // component could in principle be instantiated more than once in one
    // composition with different initial values.
    repeated SetOperation initial_parameters = 5;
}

/*
    System is the data model representing a composition co-simulation.
    It is made of Simulations of different types identified by the Identifier.
    A system must route the separate simulations.

    It has a personal identifier, a stop time, and a max step size provided by the user.
*/
message System {
    Identifier identifier = 1;
    double stop_time = 2;
    double max_step_size = 3;
    repeated RoutedSimulation composition = 4;

    // Identifiers (domain.scope.name, same convention as RoutedSimulation
    // wiring) to sample once per step and record as a time series - see
    // frelsim::recorder::Recorder. Empty means no recording happens at all
    // (the common case doesn't pay for it).
    repeated Identifier logged_outputs = 5;

    // If set and logged_outputs is non-empty, Overseer::sim() writes the
    // recorded time series to this path as CSV once the run completes. A
    // step()-driven caller isn't covered by this (each step() call
    // shouldn't rewrite the whole file) - it should call
    // Overseer::writeLog() explicitly instead once it's done.
    optional string log_path = 6;
}

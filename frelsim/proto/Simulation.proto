syntax = "proto3";

package frelsim.sim.proto;

import "frelsim/proto/Identifier.proto";
import "frelsim/proto/Value.proto";
import "google/protobuf/empty.proto";

/*
    Simulation is the data model and associated services
    with one unit of co-simulation.
*/

service Simulation {

    rpc CreateSimulation(CreateRequest) returns (google.protobuf.Empty);

    rpc GuaranteeUntil(GuaranteeUntilRequest) returns (GuaranteeUntilResponse);

    rpc StepUntil(StepUntilRequest) returns (google.protobuf.Empty);

    rpc Get(GetRequest) returns (GetResponse);

    rpc Set(SetRequest) returns (google.protobuf.Empty);

}

/*
    A system can be made up of several types of co-simulation targets.

    FrelUnit is the simulation target defined in the frelsim framework.
    These are the builtin offerings this framework provides.

    FMU is the functional mockup unit defined in the functional mockup interface standard https://fmi-standard.org/.

    Code are handwritten code components for custom user-written algorithms.
    Code is how to get software into your model if you do not want to use FMI.
*/
enum CosimulationTarget {
    Model = 0;
    FMU = 1;
    Code = 2;
}

enum SolverType {
    Euler = 0;
    RungeKutta4 = 1;
    DormandPrince = 2;
    BackwardEuler = 3;
}

message ModelSpec {
    string component_name = 1;
    SolverType solver_type = 2;

    // Only meaningful for variable-step solvers (e.g. DormandPrince). Unset
    // means "use the solver's built-in default" - see
    // frelsim::integrate::factory::createSolver.
    optional double relative_tolerance = 3;
    optional double absolute_tolerance = 4;
}

message FMUSpec {

}

message CodeSpec {

}

enum TaskType {
    Continuous = 0;
    PeriodicDiscrete = 1;
    AperiodicDiscrete = 2;
}

message Task {
    TaskType task_type = 1;

    int64 task_id = 2;

    double period = 3;

    double offset = 4;

    /*
        Use max_step_size when you want some assurance 
        on continuous states being integrated frequently enough
    */
    optional double max_step_size = 5;
}

/*
    For one unit of SimulationDescription, it identifies 
    what to load.

    If using the frelsim component, it is just the name of the component. 
    For instance, frelsim_component = "BouncingBall". 

    For FMU and Code, it is the location of the generated binary.
*/
message SimulationDescription {
    CosimulationTarget cosim_target = 1;

    oneof simulation_spec {
        ModelSpec model_spec = 2;

        FMUSpec fmu_spec = 3;

        CodeSpec code_spec = 4;
    }

    Task task = 5;

    // TODO do cosims even need to know their commrate?
    double communication_step_size = 6;

    double stop_time = 7;
}

message CreateRequest {
    SimulationDescription sim_description = 1;
}

message GuaranteeUntilRequest {
    optional Identifier simulation = 1;
}

message GuaranteeUntilResponse {
    double time = 1;
}

message StepUntilRequest {
    double stop_time = 1;
}

message GetRequest {
    repeated Identifier identifiers = 1;
}

message GetResponse {
    repeated frelsim.type.proto.Value values = 1;
}

message SetOperation {
    // The identifier identifies the resource on the Simulation
    Identifier id = 1;
    frelsim.type.proto.Value value = 2;
}

message SetRequest  {
    repeated SetOperation set_operations = 1;
}

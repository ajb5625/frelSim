name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            protobuf-compiler \
            libprotobuf-dev \
            libgrpc++-dev \
            protobuf-compiler-grpc \
            libeigen3-dev \
            libgtest-dev \
            libgmock-dev

      - name: Build
        run: make

      - name: Run tests
        run: make test
